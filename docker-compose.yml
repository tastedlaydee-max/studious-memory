version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: studious-memory-db
    environment:
      MONGO_INITDB_DATABASE: studious-memory
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - studious-memory-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studious-memory-server
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/studious-memory
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_here
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - studious-memory-network
    volumes:
      - ./server:/app/server

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: studious-memory-client
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - server
    networks:
      - studious-memory-network

volumes:
  mongodb_data:

networks:
  studious-memory-network:
    driver: bridge